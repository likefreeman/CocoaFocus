name: OpenHands Resolver

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: openhands-resolver-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve with OpenHands
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'fix-me') ||
      (github.event_name == 'pull_request' && github.event.label.name == 'fix-me') ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '@openhands-agent')) ||
      (github.event_name == 'pull_request_review_comment' && startsWith(github.event.comment.body, '@openhands-agent'))
    runs-on: ${{ vars.TARGET_RUNNER || 'ubuntu-latest' }}

    env:
      GITHUB_TOKEN: ${{ github.token }}

      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_MODEL: ${{ vars.LLM_MODEL || 'openai/deepseek-chat' }}
      LLM_BASE_URL: ${{ vars.LLM_BASE_URL || 'https://api.deepseek.com' }}

      OPENHANDS_MAX_ITER: ${{ vars.OPENHANDS_MAX_ITER || '30' }}

      PAT_USERNAME: ${{ vars.PAT_USERNAME || github.actor }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

    steps:
      - name: Run OpenHands Resolver
        uses: All-Hands-AI/OpenHands/.github/actions/openhands-resolver@main
