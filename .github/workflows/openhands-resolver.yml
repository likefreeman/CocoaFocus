name: Resolve Issue with OpenHands

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to resolve"
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  openhands-resolver:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'fix-me') ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@openhands-agent') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )

    runs-on: ubuntu-latest

    env:
      LLM_MODEL: ${{ vars.LLM_MODEL || 'openai/deepseek-chat' }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_NUM_RETRIES: 13
      LLM_RETRY_MIN_WAIT: 60
      LLM_RETRY_MAX_WAIT: 300
      LLM_TIMEOUT: 300

      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
      GITHUB_USERNAME: ${{ secrets.PAT_USERNAME || github.repository_owner }}
      GIT_USERNAME: ${{ secrets.PAT_USERNAME || github.repository_owner }}
      SANDBOX_ENV_GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone OpenHands source
        run: |
          git clone --depth 1 https://github.com/OpenHands/OpenHands.git /tmp/OpenHands
          ls -la /tmp/OpenHands/openhands/resolver

      - name: Install OpenHands from source
        run: |
          python -m pip install --upgrade pip
          cd /tmp/OpenHands
          pip install -e .

      - name: Check resolver module
        run: |
          cd /tmp/OpenHands
          PYTHONPATH=/tmp/OpenHands python -c "import openhands.resolver.resolve_issue; print('resolver module ok')"

      - name: Check required secrets
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "LLM_API_KEY is required"
            exit 1
          fi

      - name: Resolve issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          cd /tmp/OpenHands
          PYTHONPATH=/tmp/OpenHands python -m openhands.resolver.resolve_issue \
            --selected-repo "${{ github.repository }}" \
            --issue-number "$ISSUE_NUMBER" \
            --issue-type issue \
            --max-iterations "${{ vars.OPENHANDS_MAX_ITER || 30 }}"